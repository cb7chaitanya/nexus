name: raas-prod

# Production compose stack. Every value that differs between environments
# (secrets, hostnames, provider choice) comes from the environment/.env
# file passed to `docker compose`, never hardcoded here — see
# docs/deployment.md for the full list of required variables and how to
# supply them.
#
# Deployment order is enforced via depends_on/condition below, not left to
# operator discipline: postgres and redis must be healthy, then `migrate`
# must run prisma migrate deploy to completion, before api or worker are
# allowed to start. See requirement 4 / docs/deployment.md — there is no
# manual migration step.
#
# Unlike docker-compose.yml (local dev), postgres/redis/object-storage
# ports are NOT published to the host: only api and web are reachable from
# outside the compose network. Put a reverse proxy / TLS terminator in
# front of api and web for real internet-facing traffic — this file is
# infrastructure for the application tier, not an edge/ingress layer.

services:
  # Every image below is pinned to tag@digest, not a bare tag — "pg16",
  # "7-alpine", and especially "latest" all float forward as upstream
  # ships new builds, so a plain `docker compose pull` (or a fresh node
  # that's never cached the image) can silently change what's actually
  # running underneath an unchanged compose file. The digests here are
  # exactly what this stack has been built and tested against throughout
  # this repo's own development (Postgres 16.14 + pgvector 0.8.5, Redis
  # 7.4.9, MinIO RELEASE.2025-09-07T16-13-09Z) — verified via `docker
  # image inspect --format '{{json .RepoDigests}}'` against the actually-
  # running local containers, not copied from a registry page. Bump
  # deliberately (pull the new tag, re-inspect, update both the tag and
  # the digest here) rather than silently.
  postgres:
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD is required}
      # Database-level backstop against a runaway/hung query or a
      # transaction left idle mid-flight (e.g. holding a connection open
      # across a slow external call) — enforced by Postgres itself as a
      # ROLE default (infra/postgres/init.prod.sh), independent of
      # anything the Prisma client does or doesn't set. See
      # DEPLOYMENT.md's "Database connection pool and timeouts" section
      # for the full reasoning and how to apply this to an
      # already-initialized production database (these are only applied
      # automatically on first container start against a fresh volume).
      DB_STATEMENT_TIMEOUT: ${DB_STATEMENT_TIMEOUT:-30s}
      DB_IDLE_IN_TRANSACTION_TIMEOUT: ${DB_IDLE_IN_TRANSACTION_TIMEOUT:-10s}
    volumes:
      - raas_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.prod.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    # noeviction — see the identical comment in docker-compose.yml.
    # requirepass: unlike local dev, this Redis instance also backs BullMQ
    # job data and rate-limit counters for a real deployment, so it's
    # password-protected on the compose network by default.
    command: ["redis-server", "--maxmemory-policy", "noeviction", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - raas_redis_data:/data
    healthcheck:
      # Single-$ (not $${...}) deliberately — this needs the real password
      # substituted at `docker compose` config time, since (unlike
      # postgres's official image) redis:7-alpine's entrypoint doesn't
      # export REDIS_PASSWORD as a container env var for a $$-escaped,
      # runtime-shell-expanded form to read.
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  object-storage:
    # Self-hosted, S3-compatible object storage — swap for a managed
    # S3/R2 bucket in a real deployment by deleting this service and
    # pointing S3_ENDPOINT/S3_ACCESS_KEY_ID/S3_SECRET_ACCESS_KEY at it
    # instead; no application code change either way (see
    # apps/api/src/lib/storage.ts).
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - raas_object_storage_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies any pending Prisma migrations, then exits. api and
  # worker both wait on this completing successfully before they start —
  # see the top-of-file comment. Reuses the api image (it already contains
  # the Prisma CLI, schema, and migrations — see apps/api/Dockerfile)
  # rather than maintaining a fourth image just for this.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    entrypoint: ["/app/packages/db/node_modules/.bin/prisma"]
    command: ["migrate", "deploy", "--schema=packages/db/prisma/schema.prisma"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # NOTE: fixed host port — this only works unscaled (API_REPLICAS=1).
    # Raising API_REPLICAS below without also removing this published port
    # (and fronting api with a reverse proxy that load-balances across the
    # replicas instead, per this file's own top-of-file note) makes Docker
    # fail loudly at startup with "port is already allocated", since
    # multiple containers can't all bind the same host port. That failure
    # is deliberate here rather than silently picking one replica's port —
    # see DEPLOYMENT.md's "Database connection pool and timeouts" section.
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    deploy:
      replicas: ${API_REPLICAS:-1}
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-4000}
      API_HOST: 0.0.0.0
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required}
      # connection_limit/pool_timeout: Prisma's own pool defaults to
      # num_physical_cpus*2+1 with no wait-for-a-connection ceiling —
      # implicit, and uncoordinated with whatever apps/worker's own pool
      # is doing against the same Postgres max_connections budget (100,
      # this image's unmodified default). This is per-CONTAINER, not
      # per-service: total api connections are (API_REPLICAS ×
      # API_DB_CONNECTION_LIMIT), and total worker connections are
      # (WORKER_REPLICAS × WORKER_DB_CONNECTION_LIMIT) — the defaults here
      # (10 api / 15 worker, both below) leave comfortable headroom under
      # 100 only at the default replica count of 1 each. See
      # DEPLOYMENT.md's "Database connection pool and timeouts" section
      # for the full sizing formula, worked examples, and how to lower
      # these per-replica limits if this deployment is scaled out.
      APP_DATABASE_URL: postgresql://raas_app:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=${API_DB_CONNECTION_LIMIT:-10}&pool_timeout=${API_DB_POOL_TIMEOUT_SECONDS:-20}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:?SESSION_JWT_SECRET is required}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://object-storage:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-10}
      RATE_LIMIT_AUTH_WINDOW_SECONDS: ${RATE_LIMIT_AUTH_WINDOW_SECONDS:-60}
      RATE_LIMIT_CHAT_ORG_RPM: ${RATE_LIMIT_CHAT_ORG_RPM:-30}
      RATE_LIMIT_CHAT_USER_RPM: ${RATE_LIMIT_CHAT_USER_RPM:-20}
      RATE_LIMIT_CHAT_TOKEN_BUDGET_DAILY: ${RATE_LIMIT_CHAT_TOKEN_BUDGET_DAILY:-200000}
      RATE_LIMIT_INGESTION_ORG_RPM: ${RATE_LIMIT_INGESTION_ORG_RPM:-20}
      RATE_LIMIT_DOCUMENT_QUOTA_DAILY_DEFAULT: ${RATE_LIMIT_DOCUMENT_QUOTA_DAILY_DEFAULT:-200}
      RATE_LIMIT_EMBEDDING_TOKEN_BUDGET_DAILY_DEFAULT: ${RATE_LIMIT_EMBEDDING_TOKEN_BUDGET_DAILY_DEFAULT:-2000000}
      CHAT_HISTORY_MESSAGE_LIMIT: ${CHAT_HISTORY_MESSAGE_LIMIT:-20}
      KB_DELETION_ASYNC_CHUNK_THRESHOLD: ${KB_DELETION_ASYNC_CHUNK_THRESHOLD:-5000}
      # Hard per-request ceiling on completion output tokens (see
      # @raas/providers's OpenAIChatProvider) — previously only settable
      # by editing code; this is the actual per-request cost backstop, not
      # a nominal one. See apps/api/src/env.ts's own comment.
      MAX_COMPLETION_TOKENS: ${MAX_COMPLETION_TOKENS:-1024}
      # How long SIGTERM/SIGINT waits for an in-progress chat SSE stream
      # to finish before forcing exit (see apps/api/src/lib/shutdown.ts) —
      # previously only settable by editing code, meaning the graceful-
      # shutdown work done for this deployment was unreachable from
      # docker-compose.prod.yml. Keep comfortably below whatever
      # stop_grace_period the orchestrator actually enforces (Docker
      # Compose's own default is 10s if unset — raise it explicitly if
      # this default is kept, since 25s > 10s means Compose would SIGKILL
      # before this timeout fires).
      API_SHUTDOWN_TIMEOUT_MS: ${API_SHUTDOWN_TIMEOUT_MS:-25000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Optional — see apps/api/src/lib/sentry.ts. Unset (the default)
      # leaves captureException calls (the error handler's own unexpected-
      # error path, and the uncaughtException/unhandledRejection handlers
      # in index.ts) going to NoopErrorTracker, exactly as before this
      # existed. Never required for this service to start.
      SENTRY_DSN: ${SENTRY_DSN:-}
    # Must exceed API_SHUTDOWN_TIMEOUT_MS above (default 25s) or Compose's
    # own SIGKILL fires first, defeating the graceful-shutdown timeout
    # entirely — Compose's unset default is 10s. See DEPLOYMENT.md's
    # "First staging deployment" section.
    stop_grace_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    # No published host port (WORKER_HEALTH_PORT is internal-only), so
    # unlike api above, WORKER_REPLICAS > 1 needs no reverse-proxy/port
    # rework — it's safe to scale out on its own.
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
    environment:
      NODE_ENV: production
      # Sized higher than api's own connection_limit (10, see that
      # service's comment above): worker runs several concurrent BullMQ
      # workers (processing/extraction/embedding/sweep/kb-cleanup, each
      # with its own concurrency — apps/worker/src/env.ts), each opening
      # its own withTenantTransaction connections. Per-CONTAINER, same as
      # api's own connection_limit — total worker connections are
      # (WORKER_REPLICAS × WORKER_DB_CONNECTION_LIMIT). At the default
      # replica count of 1 each: 10 (api) + 15 (worker) = 25 total against
      # Postgres's default max_connections=100 — see DEPLOYMENT.md for the
      # full formula and worked examples at higher replica counts.
      APP_DATABASE_URL: postgresql://raas_app:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=${WORKER_DB_CONNECTION_LIMIT:-15}&pool_timeout=${WORKER_DB_POOL_TIMEOUT_SECONDS:-20}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT:-http://object-storage:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_BATCH_SIZE: ${OPENAI_EMBEDDING_BATCH_SIZE:-100}
      RATE_LIMIT_EMBEDDING_TOKEN_BUDGET_DAILY_DEFAULT: ${RATE_LIMIT_EMBEDDING_TOKEN_BUDGET_DAILY_DEFAULT:-2000000}
      WORKER_LOCK_DURATION_MS: ${WORKER_LOCK_DURATION_MS:-30000}
      WORKER_STALLED_INTERVAL_MS: ${WORKER_STALLED_INTERVAL_MS:-30000}
      STUCK_DOCUMENT_THRESHOLD_MS: ${STUCK_DOCUMENT_THRESHOLD_MS:-1800000}
      STUCK_DOCUMENT_SWEEP_INTERVAL_MS: ${STUCK_DOCUMENT_SWEEP_INTERVAL_MS:-300000}
      STUCK_DOCUMENT_AUTO_RETRY: ${STUCK_DOCUMENT_AUTO_RETRY:-false}
      # Ceiling on Document.retryCount before a stuck document is left
      # permanently FAILED instead of auto-retried again — only consulted
      # when STUCK_DOCUMENT_AUTO_RETRY is on. See apps/worker/src/env.ts.
      STUCK_DOCUMENT_MAX_AUTO_RETRIES: ${STUCK_DOCUMENT_MAX_AUTO_RETRIES:-3}
      # Per-document in-memory guardrail (extract-text.ts) — distinct
      # from, and lower than, the platform's accepted-upload ceiling; see
      # apps/worker/src/env.ts's own comment for why. Multiplied by
      # WORKER_EXTRACTION_CONCURRENCY below for this worker's actual
      # worst-case concurrent memory use — size both together against
      # this container's real memory limit.
      WORKER_MAX_DOCUMENT_BYTES: ${WORKER_MAX_DOCUMENT_BYTES:-209715200}
      # Per-queue concurrency — see apps/worker/src/env.ts for the
      # per-queue reasoning (processing cheap/high, extraction
      # memory-bound, embedding/kb-cleanup I/O-bound, sweep serialized).
      WORKER_PROCESSING_CONCURRENCY: ${WORKER_PROCESSING_CONCURRENCY:-10}
      WORKER_EXTRACTION_CONCURRENCY: ${WORKER_EXTRACTION_CONCURRENCY:-4}
      WORKER_EMBEDDING_CONCURRENCY: ${WORKER_EMBEDDING_CONCURRENCY:-2}
      WORKER_SWEEP_CONCURRENCY: ${WORKER_SWEEP_CONCURRENCY:-1}
      WORKER_KB_CLEANUP_CONCURRENCY: ${WORKER_KB_CLEANUP_CONCURRENCY:-2}
      # Generic per-job-attempt wall-clock ceiling (lib/job-timeout.ts) —
      # the outermost backstop against a job hung well past any reasonable
      # duration for its stage. See apps/worker/src/env.ts.
      WORKER_MAX_JOB_DURATION_MS: ${WORKER_MAX_JOB_DURATION_MS:-600000}
      # How long SIGTERM/SIGINT waits for active jobs to finish before
      # forcing exit (lib/shutdown.ts) — previously only settable by
      # editing code. Same stop_grace_period caveat as api's own
      # API_SHUTDOWN_TIMEOUT_MS above: must stay below stop_grace_period
      # below or Compose's SIGKILL fires first.
      WORKER_SHUTDOWN_TIMEOUT_MS: ${WORKER_SHUTDOWN_TIMEOUT_MS:-25000}
      # Bounds the startup Redis PING-or-fail check — a misconfigured
      # REDIS_URL fails loudly within this window instead of hanging
      # main() forever (ioredis's own default retry behavior has no
      # ceiling). See apps/worker/src/env.ts.
      WORKER_REDIS_CONNECT_TIMEOUT_MS: ${WORKER_REDIS_CONNECT_TIMEOUT_MS:-10000}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-3001}
      WORKER_HEALTH_HOST: 0.0.0.0
      # Optional — an unset URL selects a no-op notifier (see
      # apps/worker/src/lib/notifications/index.ts) rather than failing
      # to start. Set to a real receiver to get job-failure alerts.
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_TIMEOUT_MS: ${ALERT_WEBHOOK_TIMEOUT_MS:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Optional — see apps/worker/src/lib/sentry.ts. Same reasoning as
      # api's own copy of this var: unset leaves captureException calls
      # going to NoopErrorTracker, never required to start.
      SENTRY_DSN: ${SENTRY_DSN:-}
    # Must exceed WORKER_SHUTDOWN_TIMEOUT_MS above (default 25s) — see the
    # identical note on the api service above and DEPLOYMENT.md's "First
    # staging deployment" section.
    stop_grace_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      object-storage:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  raas_postgres_data:
  raas_redis_data:
  raas_object_storage_data:
